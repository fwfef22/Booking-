server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Wszystko co nie jest plikiem – przekieruj na index.html (dla React Router / Vue Router itp.)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Opcjonalnie: dłuższy cache dla assetów (css, js, obrazki)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Opcjonalnie: proxy do backendu jeśli chcesz mieć /api w tym samym domenie
    # location /api/ {
    #     proxy_pass http://backend:5000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}